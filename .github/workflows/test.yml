name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt pytest pylint
      - run: >
          python -m pytest uman_pkg/ftest.py -v -k
          'not TestCcFunctional
          and not TestGitRebase
          and not TestUmanControl
          and not TestUmanMergeRequest'
      - run: python3 -m pylint -E uman_pkg/ftest.py
